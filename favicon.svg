<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background matching slate-950 -->
  <rect width="32" height="32" rx="7" fill="#0f172a"/>
  <defs>
    <!-- Blue → indigo gradient matching the portfolio gradient-text -->
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
  <!-- "IS" initials — Iyyappan Sivakumar -->
  <text
    x="16" y="22"
    font-family="Inter, system-ui, sans-serif"
    font-size="14"
    font-weight="700"
    text-anchor="middle"
    fill="url(#grad)"
    letter-spacing="-0.5"
  >IS</text>
</svg>
